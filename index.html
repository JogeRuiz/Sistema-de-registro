<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0ea5e9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="DocenteOS - Motor Relacional V9.5 (Aqua Liquid Pro)">
    
    <title>DocenteOS - Motor Relacional V9.5</title>
    
    <link rel="manifest" id="manifest-link">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/liquid-glass.css">
</head>

<body class="antialiased selection:bg-apple-blue selection:text-white">

    <!-- SVG Filter para el efecto Liquid Glass -->
    <svg style="display:none">
      <filter id="lg-dist" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="4" result="noise" />
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </svg>

    <!-- Layout principal (oculto hasta que se verifique el token) -->
    <div id="app-layout" class="flex h-screen w-screen hidden">
        <div id="sidebar-container" class="z-20 h-full shrink-0"></div>
        <div id="sidebar-backdrop"></div>
        <button class="hamburger-btn no-print" id="hamburger-btn" onclick="toggleSidebar()" aria-label="Menú">
            <i data-lucide="menu" class="w-6 h-6"></i>
        </button>
        <main class="flex-1 flex flex-col relative overflow-hidden bg-transparent">
            <div id="main-scroll-container" class="flex-1 overflow-y-auto p-6 md:p-8 lg:p-10 custom-scrollbar relative">
                <div id="content-area" class="fade-enter min-h-full"></div>
            </div>
        </main>
    </div>
    
    <div id="toast-container" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[10000] flex flex-col gap-3 pointer-events-none w-full max-w-sm px-4"></div>

    <!-- Pantalla de carga (se muestra mientras se verifica el token) -->
    <div id="loading" class="h-screen w-screen flex items-center justify-center bg-apple-lightbg dark:bg-apple-darkbg z-[9999] absolute inset-0 transition-opacity duration-700 ease-in-out">
        <div class="flex flex-col items-center gap-6">
            <div class="relative flex items-center justify-center w-24 h-24 bg-apple-blue rounded-[28px] shadow-2xl shadow-sky-500/50 border-2 border-white/20 animate-pulse-slow">
                <i data-lucide="loader" class="w-12 h-12 animate-spin text-white"></i>
            </div>
            <div class="text-center">
                <span class="text-slate-800 dark:text-slate-200 font-black text-2xl tracking-tight block mb-2">Iniciando DocenteOS</span>
                <span class="text-slate-500 dark:text-slate-400 font-semibold text-sm tracking-widest uppercase">Verificando autenticación…</span>
            </div>
        </div>
    </div>

    <!-- Librerías externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        apple: { blue: '#0ea5e9', darkbg: '#082f49', lightbg: '#f0f9ff', glass: 'rgba(255, 255, 255, 0.5)', glassdark: 'rgba(15, 23, 42, 0.6)' },
                        warm: { yellow: '#fbbf24', orange: '#f97316', rose: '#fb7185', lavender: '#a78bfa', mint: '#34d399' }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards',
                        'spring-up': 'springUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        springUp: { '0%': { opacity: '0', transform: 'translateY(30px) scale(0.95)' }, '100%': { opacity: '1', transform: 'translateY(0) scale(1)' } }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>

    <!-- Módulos de DocenteOS (orden correcto) -->
    <script src="js/config.js"></script>
    <script src="js/db.js"></script>
    <script src="js/state.js"></script>
    <script src="js/google.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/views/dashboard.js"></script>
    <script src="js/views/attendance.js"></script>
    <script src="js/views/grades.js"></script>
    <script src="js/views/students.js"></script>
    <script src="js/views/notes.js"></script>
    <script src="js/views/logbook.js"></script>
    <script src="js/views/agenda.js"></script>
    <script src="js/views/intensification.js"></script>
    <script src="js/views/planning.js"></script>
    <script src="js/views/settings.js"></script>
    <script src="js/views/files.js"></script>  
    <script src="js/modals.js"></script>
    <script src="js/main.js"></script>
    
    <!-- Botones flotantes para scroll rápido (siempre visibles) -->
    <button id="scroll-down-btn" class="fixed bottom-6 right-6 z-[10001] w-12 h-12 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border border-white/50 dark:border-slate-700 shadow-2xl rounded-full flex items-center justify-center" onclick="scrollView('down')" title="Bajar">
      <i data-lucide="chevron-down" class="w-6 h-6 text-apple-blue dark:text-sky-400"></i>
    </button>
    <button id="scroll-up-btn" class="fixed bottom-20 right-6 z-[10001] w-12 h-12 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border border-white/50 dark:border-slate-700 shadow-2xl rounded-full flex items-center justify-center" onclick="scrollView('up')" title="Subir">
      <i data-lucide="chevron-up" class="w-6 h-6 text-apple-blue dark:text-sky-400"></i>
    </button>
</body>
</html>
