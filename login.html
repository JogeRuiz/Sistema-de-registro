<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0ea5e9">
    <title>DocenteOS – Iniciar Sesión</title>
    
    <link rel="stylesheet" href="css/liquid-glass.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    
    <style>
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-fade-in {
            animation: fadeIn 0.6s ease forwards;
        }
        .google-btn {
            transition: all 0.3s ease;
        }
        .google-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="antialiased selection:bg-apple-blue selection:text-white">

    <!-- SVG Filter -->
    <svg style="display:none">
      <filter id="lg-dist" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="4" result="noise" />
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </svg>

    <div class="h-screen w-screen flex items-center justify-center p-4">
        <div class="modal-box p-0 relative overflow-hidden animate-fade-in" style="max-width:380px; width:100%; border-radius:2rem;">
            <div class="lg-specular"></div>
            <div class="lg-content p-8 text-center">
                <!-- Ícono simple de nube -->
                <div class="w-14 h-14 bg-sky-500/20 rounded-2xl flex items-center justify-center mx-auto mb-6">
                    <i data-lucide="cloud" class="w-7 h-7 text-sky-600"></i>
                </div>
                
                <h1 class="text-2xl font-bold mb-1" style="color:var(--lg-text-primary);">DocenteOS</h1>
                <p class="text-sm mb-8" style="color:var(--lg-text-secondary);">
                    Gestión escolar inteligente
                </p>
                
                <button onclick="handleLogin()" 
                        class="google-btn w-full py-3.5 bg-white/20 backdrop-blur-md border border-white/30 rounded-xl font-semibold text-sm hover:bg-white/30 transition-all flex items-center justify-center gap-3"
                        style="color:var(--lg-text-primary);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Iniciar sesión con Google
                </button>
                
                <p class="text-xs mt-6 opacity-50" style="color:var(--lg-text-secondary);">
                    Tus datos se guardan de forma segura en tu Drive
                </p>
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID = "1074987596307-0qa9ejmlna92mq66ohmo51n37fctlbkq.apps.googleusercontent.com";

        window.addEventListener('load', () => {
            lucide.createIcons();
        });

        window.handleLogin = () => {
            const client = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/drive.file ' +
                       'https://www.googleapis.com/auth/classroom.courses ' +
                       'https://www.googleapis.com/auth/classroom.rosters ' +
                       'https://www.googleapis.com/auth/classroom.coursework.students',
                callback: (resp) => {
                    if (resp.error) {
                        alert("Error de autenticación: " + resp.error);
                        return;
                    }
                    localStorage.setItem('docenteos_google_token', resp.access_token);
                    window.location.href = 'index.html';
                }
            });
            client.requestAccessToken();
        };

        if (localStorage.getItem('docenteos_google_token')) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
